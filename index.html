<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Memo App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Simple Memo</h1>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="メモを検索...">
            </div>
        </header>

        <main>
            <section class="input-section">
                <div class="input-card">
                    <input type="text" id="memoTitle" placeholder="タイトル（任意）">
                    <textarea id="memoContent" placeholder="メモを入力..." rows="3"></textarea>
                    <button id="addMemoBtn">追加</button>
                </div>
            </section>

            <section class="memo-list-section">
                <div id="memoList" class="memo-list">
                    <!-- メモがここに動的に追加されます -->
                </div>
                <div id="emptyState" class="empty-state">
                    <p>メモがありません。新しいメモを追加してみましょう！</p>
                </div>
            </section>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
