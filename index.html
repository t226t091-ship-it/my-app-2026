<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FANTASY MEMO App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="decoration-layer"></div>
    <div class="extra-decor">
        <div class="owl">🦉</div>
        <div class="fairy" id="fairy">
            <span class="fairy-emoji">🧚</span>
            <span class="fairy-speech" id="fairySpeech"></span>
        </div>
    </div>
    <div class="butterfly">🦋</div>
    <div class="butterfly" style="animation-delay: -5s; animation-duration: 20s; font-size: 1.2rem;">🦋</div>
    <div class="container">
        <header>
            <div class="header-decor">
                <span>🌸</span>
                <span>🌼</span>
                <span>🍀</span>
                <span>🌺</span>
            </div>
            <h1>FANTASY MEMO</h1>
            <div class="controls-container">
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="メモを検索...">
                </div>
                <div class="filter-sort-container">
                    <select id="attributeFilter">
                        <option value="all">すべての属性</option>
                        <option value="fire">🔥 火 (重要)</option>
                        <option value="water">💧 水 (日常)</option>
                        <option value="earth">🌱 地 (記録)</option>
                        <option value="wind">🍃 風 (アイデア)</option>
                        <option value="light">✨ 光 (目標)</option>
                        <option value="dark">🔮 闇 (秘密)</option>
                    </select>
                    <select id="sortOrder">
                        <option value="newest">新しい順</option>
                        <option value="oldest">古い順</option>
                        <option value="title">タイトル順</option>
                    </select>
                </div>
            </div>
        </header>

        <main>
            <section class="input-section">
                <div class="input-card">
                    <input type="hidden" id="editingId">
                    <div class="input-header">
                        <input type="text" id="memoTitle" placeholder="タイトル（任意）">
                        <select id="memoAttribute">
                            <option value="none">属性なし</option>
                            <option value="fire">🔥 火</option>
                            <option value="water">💧 水</option>
                            <option value="earth">🌱 地</option>
                            <option value="wind">🍃 風</option>
                            <option value="light">✨ 光</option>
                            <option value="dark">🔮 闇</option>
                        </select>
                    </div>
                    <textarea id="memoContent" placeholder="メモを入力..." rows="3"></textarea>
                    <div class="button-group">
                        <button id="addMemoBtn">追加</button>
                        <button id="cancelEditBtn" class="hidden">キャンセル</button>
                    </div>
                </div>
            </section>

            <section class="memo-list-section">
                <div id="memoList" class="memo-list">
                    <!-- メモがここに動的に追加されます -->
                </div>
                <div id="emptyState" class="empty-state">
                    <p>メモがありません。新しいメモを追加してみましょう！</p>
                </div>
            </section>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
